version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
    build:
      commands:
        - echo "BLING_CLIENT_ID=$BLING_CLIENT_ID" >> .env
        - echo "BLING_CLIENT_SECRET=$BLING_CLIENT_SECRET" >> .env
        - echo "BLING_REDIRECT_URI=$BLING_REDIRECT_URI" >> .env
        - npx prisma db push
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*